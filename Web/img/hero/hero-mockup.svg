<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <!-- Fondo browser -->
  <rect width="900" height="520" rx="16" fill="#1e293b"/>
  <!-- Barra browser -->
  <rect width="900" height="44" rx="16 16 0 0" fill="#334155"/>
  <rect y="30" width="900" height="14" fill="#334155"/>
  <circle cx="26" cy="22" r="7" fill="#ef4444"/>
  <circle cx="50" cy="22" r="7" fill="#f59e0b"/>
  <circle cx="74" cy="22" r="7" fill="#22c55e"/>
  <!-- URL bar -->
  <rect x="120" y="11" width="300" height="22" rx="11" fill="#475569"/>
  <text x="270" y="26" font-family="Roboto,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">🔒  tunegocio.com</text>

  <!-- Contenido web -->
  <rect y="44" width="900" height="476" fill="#f8fafc"/>

  <!-- Navbar interior -->
  <rect y="44" width="900" height="56" fill="white"/>
  <rect x="32" y="60" width="90" height="24" rx="6" fill="#4f46e5"/>
  <text x="77" y="76" font-family="Roboto,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Tu Logo</text>
  <rect x="300" y="65" width="50" height="14" rx="4" fill="#e2e8f0"/>
  <rect x="368" y="65" width="60" height="14" rx="4" fill="#e2e8f0"/>
  <rect x="446" y="65" width="55" height="14" rx="4" fill="#e2e8f0"/>
  <rect x="800" y="60" width="68" height="24" rx="12" fill="#4f46e5"/>
  <text x="834" y="76" font-family="Roboto,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Contacto</text>

  <!-- Hero section -->
  <rect y="100" width="900" height="220" fill="url(#heroGrad)"/>
  <text x="450" y="168" font-family="Roboto,sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">Tu Negocio Online</text>
  <text x="450" y="196" font-family="Roboto,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">La mejor solución para tu empresa</text>
  <rect x="330" y="218" width="110" height="36" rx="18" fill="white"/>
  <text x="385" y="241" font-family="Roboto,sans-serif" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="middle">Comenzar ahora</text>
  <rect x="454" y="218" width="116" height="36" rx="18" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
  <text x="512" y="241" font-family="Roboto,sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Ver servicios</text>

  <!-- Tarjetas servicios -->
  <rect x="32" y="340" width="190" height="110" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="44" y="354" width="32" height="32" rx="8" fill="#e0e7ff"/>
  <text x="60" y="375" font-family="Roboto,sans-serif" font-size="16" text-anchor="middle">🌐</text>
  <rect x="44" y="394" width="110" height="10" rx="5" fill="#1e293b"/>
  <rect x="44" y="412" width="150" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="44" y="426" width="130" height="8" rx="4" fill="#e2e8f0"/>

  <rect x="242" y="340" width="190" height="110" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="254" y="354" width="32" height="32" rx="8" fill="#dcfce7"/>
  <text x="270" y="375" font-family="Roboto,sans-serif" font-size="16" text-anchor="middle">🛒</text>
  <rect x="254" y="394" width="110" height="10" rx="5" fill="#1e293b"/>
  <rect x="254" y="412" width="150" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="254" y="426" width="130" height="8" rx="4" fill="#e2e8f0"/>

  <rect x="452" y="340" width="190" height="110" rx="12" fill="white" filter="url(#sh)"/>
  <rect x="464" y="354" width="32" height="32" rx="8" fill="#fef3c7"/>
  <text x="480" y="375" font-family="Roboto,sans-serif" font-size="16" text-anchor="middle">⚡</text>
  <rect x="464" y="394" width="110" height="10" rx="5" fill="#1e293b"/>
  <rect x="464" y="412" width="150" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="464" y="426" width="130" height="8" rx="4" fill="#e2e8f0"/>

  <rect x="662" y="340" width="190" height="110" rx="12" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="674" y="354" width="32" height="32" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="690" y="375" font-family="Roboto,sans-serif" font-size="16" text-anchor="middle">🎨</text>
  <rect x="674" y="394" width="110" height="10" rx="5" fill="white"/>
  <rect x="674" y="412" width="150" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="674" y="426" width="130" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>

  <!-- Footer strip -->
  <rect y="468" width="900" height="52" fill="#0f172a"/>
  <text x="450" y="498" font-family="Roboto,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">© 2025 Tu Negocio — Diseñado por Uctured</text>

  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="662" y1="340" x2="852" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
